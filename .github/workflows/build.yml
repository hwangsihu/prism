# SPDX-License-Identifier: MPL-2.0
name: Build
on:
  workflow_call:
    inputs:
      build_docs:        { type: boolean, default: false }
      build_windows:     { type: boolean, default: false }
      build_linux:       { type: boolean, default: false }
      build_macos:       { type: boolean, default: false }
      build_ios:         { type: boolean, default: false }
      build_android:     { type: boolean, default: false }
      build_emscripten:  { type: boolean, default: false }
      build_gdextension: { type: boolean, default: false }
      build_wheels:      { type: boolean, default: false }
      build_sdist:       { type: boolean, default: false }
env:
  CMAKE_COMMON: >-
    -G Ninja
    -DPRISM_ENABLE_TESTS=OFF
    -DPRISM_ENABLE_DEMOS=OFF

jobs:
  docs:
    if: inputs.build_docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build docs
        run: |
          cargo install --all-features mdbook
          mdbook build doc
      - uses: actions/upload-artifact@v7
        with:
          name: docs
          path: doc/book

  windows:
    if: inputs.build_windows
    strategy:
      fail-fast: true
      matrix:
        include:
          - { name: x64,   msvc_arch: amd64,       extra_cmake: "" }
          - { name: arm64, msvc_arch: amd64_arm64,  extra_cmake: "-DCMAKE_SYSTEM_PROCESSOR=ARM64" }
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}
      - name: Build all configurations
        shell: pwsh
        run: |
          foreach ($shared in @("ON", "OFF")) {
            $linkage = if ($shared -eq "ON") { "dynamic" } else { "static" }
            foreach ($bt in @("Release", "Debug")) {
              $config = $bt.ToLower()
              cmake -B "build-${linkage}-${config}" `
                -G Ninja `
                -DPRISM_ENABLE_TESTS=OFF `
                -DPRISM_ENABLE_DEMOS=OFF `
                "-DCMAKE_BUILD_TYPE=$bt" `
                "-DBUILD_SHARED_LIBS=$shared" `
                -DPRISM_ENABLE_GDEXTENSION=OFF ${{ matrix.extra_cmake }}
              cmake --build "build-${linkage}-${config}"
            }
          }
      - name: Package
        shell: pwsh
        run: |
          foreach ($linkage in @("dynamic", "static")) {
            foreach ($config in @("release", "debug")) {
              $src = "build-${linkage}-${config}"
              mkdir -p "dist/${linkage}/${config}/lib"
              mkdir -p "dist/${linkage}/${config}/bin"
              if ($linkage -eq "dynamic") {
                cp "${src}/prism.dll" "dist/${linkage}/${config}/bin/"
                cp "${src}/prism.lib" "dist/${linkage}/${config}/lib/"
              } else {
                cp "${src}/prism.lib" "dist/${linkage}/${config}/lib/"
              }
              if ($config -eq "debug") {
                cp "${src}/prism.pdb" "dist/${linkage}/${config}/bin/" -ErrorAction SilentlyContinue
              }
            }
          }
          mkdir -p dist/include
          cp include/prism.h dist/include/
          cp -r LICENSES dist
          cp NOTICE dist
          Compress-Archive -Path dist/* -DestinationPath "prism-windows-${{ matrix.name }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.name }}
          path: prism-windows-${{ matrix.name }}.zip

  linux:
    if: inputs.build_linux
    strategy:
      fail-fast: true
      matrix:
        include:
          - { name: x64,   os: ubuntu-latest }
          - { name: arm64, os: ubuntu-24.04-arm }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libspeechd-dev libglib2.0-dev
      - name: Build all configurations
        run: |
          for shared in ON OFF; do
            linkage=$( [ "$shared" = "ON" ] && echo "dynamic" || echo "static" )
            for bt in Release Debug; do
              config=$(echo "$bt" | tr '[:upper:]' '[:lower:]')
              cmake -B "build-${linkage}-${config}" ${{ env.CMAKE_COMMON }} \
                -DCMAKE_BUILD_TYPE="$bt" \
                -DBUILD_SHARED_LIBS="$shared" \
                -DPRISM_ENABLE_GDEXTENSION=OFF
              cmake --build "build-${linkage}-${config}"
            done
          done
      - name: Package
        run: |
          for linkage in dynamic static; do
            for config in release debug; do
              mkdir -p "dist/${linkage}/${config}/lib"
              src="build-${linkage}-${config}"
              if [ "$linkage" = "dynamic" ]; then
                cp "${src}/libprism.so" "dist/${linkage}/${config}/lib/"
              else
                cp "${src}/libprism.a" "dist/${linkage}/${config}/lib/"
              fi
            done
          done
          mkdir -p dist/include
          cp include/prism.h dist/include/
          cp -r LICENSES dist
          cp NOTICE dist
          cd dist && zip -r "../prism-linux-${{ matrix.name }}.zip" .
      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.name }}
          path: prism-linux-${{ matrix.name }}.zip

  macos:
    if: inputs.build_macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build all configurations
        run: |
          for shared in ON OFF; do
            linkage=$( [ "$shared" = "ON" ] && echo "dynamic" || echo "static" )
            for bt in Release Debug; do
              config=$(echo "$bt" | tr '[:upper:]' '[:lower:]')
              for arch in arm64 x86_64; do
                extra_flags=""
                if [ "$arch" = "x86_64" ]; then
                  extra_flags="-DCMAKE_Swift_COMPILER_TARGET=x86_64-apple-macosx15.0"
                fi
                cmake -B "build-${arch}-${linkage}-${config}" ${{ env.CMAKE_COMMON }} \
                  -DCMAKE_BUILD_TYPE="$bt" \
                  -DCMAKE_OSX_ARCHITECTURES="$arch" \
                  -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
                  -DBUILD_SHARED_LIBS="$shared" \
                  -DPRISM_ENABLE_GDEXTENSION=OFF \
                  $extra_flags
                cmake --build "build-${arch}-${linkage}-${config}"
              done
            done
          done
      - name: Package
        run: |
          for linkage in dynamic static; do
            for config in release debug; do
              mkdir -p "dist/${linkage}/${config}/lib"
              if [ "$linkage" = "dynamic" ]; then
                lipo -create \
                  "build-arm64-${linkage}-${config}/libprism.dylib" \
                  "build-x86_64-${linkage}-${config}/libprism.dylib" \
                  -output "dist/${linkage}/${config}/lib/libprism.dylib"
              else
                lipo -create \
                  "build-arm64-${linkage}-${config}/libprism.a" \
                  "build-x86_64-${linkage}-${config}/libprism.a" \
                  -output "dist/${linkage}/${config}/lib/libprism.a"
              fi
              if [ "$config" = "debug" ]; then
                cp -r "build-arm64-${linkage}-${config}/libprism.dylib.dSYM" \
                  "dist/${linkage}/${config}/lib/" 2>/dev/null || true
              fi
            done
          done
          mkdir -p dist/include
          cp include/prism.h dist/include/
          cp -r LICENSES dist
          cp NOTICE dist
          cd dist && zip -r ../prism-macos-universal.zip .
      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: prism-macos-universal.zip

  ios:
    if: inputs.build_ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download iOS toolchain
        run: curl -sSL https://raw.githubusercontent.com/leetal/ios-cmake/master/ios.toolchain.cmake -o ios.toolchain.cmake
      - name: Build all configurations
        run: |
          for shared in ON OFF; do
            linkage=$( [ "$shared" = "ON" ] && echo "dynamic" || echo "static" )
            for bt in Release Debug; do
              config=$(echo "$bt" | tr '[:upper:]' '[:lower:]')
              cmake -B "build-${linkage}-${config}" ${{ env.CMAKE_COMMON }} \
                -DCMAKE_BUILD_TYPE="$bt" \
                -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake \
                -DPLATFORM=OS64 -DDEPLOYMENT_TARGET=16.0 \
                -DCMAKE_Swift_FLAGS="-target arm64-apple-ios16.0" \
                -DBUILD_SHARED_LIBS="$shared" \
                -DPRISM_ENABLE_GDEXTENSION=OFF
              cmake --build "build-${linkage}-${config}"
            done
          done
      - name: Package
        run: |
          for linkage in dynamic static; do
            for config in release debug; do
              mkdir -p "dist/${linkage}/${config}/lib"
              src="build-${linkage}-${config}"
              if [ "$linkage" = "dynamic" ]; then
                cp "${src}/libprism.dylib" "dist/${linkage}/${config}/lib/" 2>/dev/null || true
              else
                cp "${src}/libprism.a" "dist/${linkage}/${config}/lib/" 2>/dev/null || true
              fi
              if [ "$config" = "debug" ]; then
                cp -r "${src}"/*.dSYM "dist/${linkage}/${config}/lib/" 2>/dev/null || true
              fi
            done
          done
          mkdir -p dist/include
          cp include/prism.h dist/include/
          cp -r LICENSES dist
          cp NOTICE dist
          cd dist && zip -r ../prism-ios-arm64.zip .
      - uses: actions/upload-artifact@v7
        with:
          name: ios-arm64
          path: prism-ios-arm64.zip

  android:
    if: inputs.build_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build
        run: chmod +x gradlew && ./gradlew assembleRelease assembleDebug
      - name: Package
        run: |
          mkdir -p dist/{debug,release,include}
          cp build/android/gradle/outputs/aar/*-release.aar dist/release/
          cp build/android/gradle/outputs/aar/*-debug.aar dist/debug/
          cp include/prism.h dist/include/
          cp -r LICENSES dist
          cp NOTICE dist
          cd dist && zip -r ../prism-android.zip .
      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: prism-android.zip

  emscripten:
    if: inputs.build_emscripten
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Build all configurations
        run: |
          for bt in Release Debug; do
            config=$(echo "$bt" | tr '[:upper:]' '[:lower:]')
            emcmake cmake -B "build-${config}" ${{ env.CMAKE_COMMON }} \
              -DCMAKE_BUILD_TYPE="$bt" \
              -DPRISM_ENABLE_GDEXTENSION=OFF
            cmake --build "build-${config}"
          done
      - name: Package
        run: |
          mkdir -p dist/static/{release,debug} dist/include
          cp build-release/libprism.a dist/static/release/
          cp build-debug/libprism.a dist/static/debug/
          cp include/prism.h dist/include/
          cp -r LICENSES dist
          cp NOTICE dist
          cd dist && zip -r ../prism-wasm.zip .
      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: prism-wasm.zip

  gdextension:
    if: inputs.build_gdextension
    strategy:
      fail-fast: true
      matrix:
        target-type: [template_debug, template_release]
        target:
          - { platform: linux,   arch: x86_64, os: ubuntu-latest }
          - { platform: linux,   arch: x86_32, os: ubuntu-latest }
          - { platform: linux,   arch: arm64,  os: ubuntu-24.04-arm }
          - { platform: linux,   arch: arm32,  os: ubuntu-24.04-arm }
          - { platform: windows, arch: x86_64, os: windows-latest }
          - { platform: windows, arch: x86_32, os: windows-latest }
          - { platform: windows, arch: arm64,  os: windows-latest }
          - { platform: macos,   arch: arm64,  os: macos-latest }
          - { platform: macos,   arch: x86_64, os: macos-latest }
          - { platform: android, arch: x86_64, os: ubuntu-latest }
          - { platform: android, arch: x86_32, os: ubuntu-latest }
          - { platform: android, arch: arm64,  os: ubuntu-latest }
          - { platform: android, arch: arm32,  os: ubuntu-latest }
          - { platform: ios,     arch: arm64,  os: macos-latest }
          - { platform: web,     arch: wasm32, os: ubuntu-latest }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: install multilib (x86_32)
        if: matrix.target.platform == 'linux' && matrix.target.arch == 'x86_32'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib
      - name: install armhf cross-compiler
        if: matrix.target.platform == 'linux' && matrix.target.arch == 'arm32'
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
      - name: install native deps
        if: matrix.target.platform == 'linux' && (matrix.target.arch == 'x86_64' || matrix.target.arch == 'arm64')
        run: |
          sudo apt-get update
          sudo apt-get install -y libspeechd-dev libglib2.0-dev
      - name: MSVC setup
        if: matrix.target.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: >-
            ${{
              matrix.target.arch == 'x86_64' && 'amd64'       ||
              matrix.target.arch == 'x86_32' && 'x86'         ||
              matrix.target.arch == 'arm64'  && 'amd64_arm64'
            }}
      - name: NDK setup
        if: matrix.target.platform == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
      - name: download iOS toolchain
        if: matrix.target.platform == 'ios'
        run: curl -sSL https://raw.githubusercontent.com/leetal/ios-cmake/master/ios.toolchain.cmake -o ios.toolchain.cmake
      - name: Emscripten setup
        if: matrix.target.platform == 'web'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Configure
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          if [ "${{ matrix.target-type }}" = "template_release" ]; then
            cmake_bt="Release"
          else
            cmake_bt="Debug"
          fi
          args=(
            -B build ${{ env.CMAKE_COMMON }}
            -DCMAKE_BUILD_TYPE="$cmake_bt"
            -DBUILD_SHARED_LIBS=OFF
            -DPRISM_ENABLE_GDEXTENSION=ON
            -DGODOTCPP_TARGET="${{ matrix.target-type }}"
          )
          use_emcmake=false
          case "${{ matrix.target.platform }}-${{ matrix.target.arch }}" in
            linux-x86_64|linux-arm64)
              ;;
            linux-x86_32)
              args+=( -DCMAKE_C_FLAGS="-m32" -DCMAKE_CXX_FLAGS="-m32"
                      -DCMAKE_SYSTEM_NAME=Linux
                      -DCMAKE_SYSTEM_PROCESSOR=x86_32 )
              ;;
            linux-arm32)
              args+=( -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc
                      -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++
                      -DCMAKE_SYSTEM_NAME=Linux
                      -DCMAKE_SYSTEM_PROCESSOR=arm32 )
              ;;
            windows-x86_64)
              ;;
            windows-x86_32)
              args+=( -DCMAKE_SYSTEM_NAME=Windows
                      -DCMAKE_SYSTEM_PROCESSOR=x86_32 )
              ;;
            windows-arm64)
              args+=( -DCMAKE_SYSTEM_NAME=Windows
                      -DCMAKE_SYSTEM_PROCESSOR=arm64 )
              ;;
            macos-arm64)
              args+=( -DCMAKE_OSX_ARCHITECTURES=arm64
                      -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 )
              ;;
            macos-x86_64)
              args+=( -DCMAKE_OSX_ARCHITECTURES=x86_64
                      -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
                      -DCMAKE_Swift_COMPILER_TARGET=x86_64-apple-macosx15.0 )
              ;;
            android-*)
              declare -A abi_map=( [arm64]=arm64-v8a [arm32]=armeabi-v7a
                                   [x86_64]=x86_64  [x86_32]=x86 )
              args+=( "-DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake"
                      "-DANDROID_ABI=${abi_map[${{ matrix.target.arch }}]}"
                      -DANDROID_PLATFORM=android-21 )
              ;;
            ios-arm64)
              args+=( -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake
                      -DPLATFORM=OS64 -DDEPLOYMENT_TARGET=16.0
                      "-DCMAKE_Swift_FLAGS=-target arm64-apple-ios16.0" )
              ;;
            web-wasm32)
              use_emcmake=true
              ;;
          esac
          if [ "$use_emcmake" = "true" ]; then
            emcmake cmake "${args[@]}"
          else
            cmake "${args[@]}"
          fi
      - name: Build
        run: cmake --build build --target prismatoid
      - name: Verify and fix binary name
        shell: bash
        run: |
          platform="${{ matrix.target.platform }}"
          arch="${{ matrix.target.arch }}"
          target="${{ matrix.target-type }}"
          outdir="gdextension/project/bin/${platform}"
          case "$platform" in
            windows)    ext="dll" ;;
            macos|ios)  ext="dylib" ;;
            *)          ext="so" ;;
          esac
          expected="prismatoid.${platform}.${target}.${arch}.${ext}"
          actual=$(find "$outdir" -type f 2>/dev/null | head -1)
          if [ -z "$actual" ]; then
            echo "No binary found in ${outdir}"
            exit 1
          fi
          actual_name=$(basename "$actual")
          if [ "$actual_name" = "$expected" ]; then
            echo "Binary name correct: ${actual_name}"
          else
            echo "Renaming ${actual_name} -> ${expected}"
            mv "$actual" "${outdir}/${expected}"
          fi
      - name: Remove Windows ancillary files
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          Remove-Item gdextension/project/bin/* -Include *.exp,*.lib,*.pdb `
            -Recurse -Force -ErrorAction SilentlyContinue
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: gdextension-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.target-type }}
          path: gdextension/project/bin/**

  wheels:
    if: inputs.build_wheels
    name: Build wheels for ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: linux-arm
            runs-on: ubuntu-24.04-arm
          - os: windows-intel
            runs-on: windows-latest
          - os: windows-arm
            runs-on: windows-11-arm
          - os: macos-intel
            runs-on: macos-15-intel
          - os: macos-arm
            runs-on: macos-latest
          - os: android-intel
            runs-on: ubuntu-latest
            platform: android
          - os: android-arm
            runs-on: ubuntu-latest
            platform: android
            archs: arm64_v8a
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6
      - name: Activate MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
          CIBW_ARCHS: ${{ matrix.archs || 'auto' }}
          ANDROID_API_LEVEL: 30
      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  sdist:
    if: inputs.build_sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: cibw-sdist
          path: dist/*.tar.gz
